services:
  app:
    build: .
    ports:
      - "8080:8080"
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      MONGO_URI: mongodb://mongo:27017
      MONGO_DB: mykadri
      MONGO_COLLECTION: movies
      TMDB_API_KEY: ${TMDB_API_KEY:-}
    networks:
      - app-network
    restart: on-failure

  mongo:
    image: mongo:7
    container_name: mykadri-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
      - ./mongo-seed:/docker-entrypoint-initdb.d:ro
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  mongo-data:

networks:
  app-network:
    driver: bridge

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ .Title }} - WatchClean</title>
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <div class="app-container">
      <header class="header">
        <div class="header-content">
          <a href="/" class="logo">
            <div class="logo-icon"></div>
            <span class="logo-text">WatchClean</span>
          </a>
          <div class="search-container">
            <div class="search-bar">
              <input
                type="text"
                id="searchInput"
                class="search-input"
                placeholder="Search..."
                autocomplete="off"
              />
              <div class="search-icon">🔍</div>
            </div>
          </div>
        </div>
      </header>

      <main class="main-content">
        <div class="detail-container">
          <div class="detail-header">
            <h1 class="detail-title">{{ .Title }}</h1>
            {{ if .TitleEnglish }}
            <p class="detail-subtitle">{{ .TitleEnglish }}</p>
            {{ end }}
          </div>

          <div class="detail-meta">
            <div class="meta-item">
              <span class="meta-label">Release</span>
              <span class="meta-value">{{ .Year }}</span>
            </div>
            <div class="meta-item">
              <span class="meta-label">Type</span>
              <span class="meta-value">Movie</span>
            </div>
            <div class="meta-item">
              <span class="meta-label">Status</span>
              <span class="meta-value" style="color: var(--success)">Online</span>
            </div>
          </div>

          <div class="detail-content">
            <div class="poster-section">
              <img src="{{ .Image }}" alt="{{ .Title }}" class="detail-poster" onerror="this.src='/images/movies.jpg'" />
            </div>

            <div class="video-section">
              {{ if .VideoURL }}
              <div class="video-player">
                <iframe src="{{ .VideoURL }}" allowfullscreen></iframe>
              </div>
              {{ else }}
              <div class="loading" style="border: 1px solid var(--border); background: var(--bg-secondary);">
                Video stream currently unavailable
              </div>
              {{ end }}
            </div>
          </div>
        </div>
      </main>
    </div>
  </body>
</html>

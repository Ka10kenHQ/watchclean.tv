<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>WatchClean - Movies</title>
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <div class="app-container">
      <header class="header">
        <div class="header-content">
          <a href="/" class="logo">
            <div class="logo-icon"></div>
            <span class="logo-text">WatchClean</span>
          </a>
          <div class="search-container">
            <div class="search-bar">
              <input
                type="text"
                id="searchInput"
                class="search-input"
                placeholder="Search movies..."
                autocomplete="off"
              />
              <button id="searchClear" class="search-clear">✕</button>
              <div class="search-icon">🔍</div>
            </div>
            <div id="searchResults" class="search-results"></div>
          </div>
        </div>
      </header>

      <div class="status-bar">
        <div class="status-item">
          <div class="status-dot"></div>
          <span>Movies</span>
        </div>
      </div>

      <main class="main-content">
        <div class="pagination pagination-top">
          <button id="prev-top" class="nav-button">Prev</button>
          <div id="page-numbers-top" class="page-numbers"></div>
          <div id="page-number-top" class="page-info">01 / 01</div>
          <button id="next-top" class="nav-button">Next</button>
        </div>

        <div id="movie-grid" class="movies-grid">
          <div class="loading">Fetching movies...</div>
        </div>

        <div class="pagination pagination-bottom">
          <button id="prev" class="nav-button">Prev</button>
          <div id="page-numbers" class="page-numbers"></div>
          <div id="page-number" class="page-info">01 / 01</div>
          <button id="next" class="nav-button">Next</button>
        </div>
      </main>
    </div>

    <script src="/static/movies.js"></script>
  </body>
</html>
